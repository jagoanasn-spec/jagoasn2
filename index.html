<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cek Kelulusan - SMA Negeri 1 Bunut</title>
  
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    * { font-family: 'Plus Jakarta Sans', sans-serif; box-sizing: border-box; }
    html, body { height: 100vh; width: 100vw; margin: 0; padding: 0; overflow-x: hidden; }
    
    .glass { 
      background: rgba(255,255,255,0.95); 
      backdrop-filter: blur(20px); 
      -webkit-backdrop-filter: blur(20px);
    }
    
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeDown { from { opacity:1; transform:translateY(0); } to { opacity:0; transform:translateY(-20px); } }
    @keyframes confetti { 0% { transform: translateY(0) rotate(0deg); opacity:1; } 100% { transform: translateY(-250px) rotate(720deg); opacity:0; } }
    @keyframes scaleIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
    
    .fade-up { animation: fadeUp 0.6s ease-out forwards; }
    .fade-out { animation: fadeDown 0.4s ease-in forwards; }
    .scale-in { animation: scaleIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    .confetti-piece { position:absolute; width:8px; height:8px; border-radius:2px; animation: confetti 1.5s ease forwards; }
    
    input, button { transition: all 0.3s ease; }
    input:focus { outline: none; ring: 2px solid #0284c7; }
    
    /* FIXED: Input height sama PERSIS di HP */
    input[type="text"], 
    input[type="date"] { 
      height: 48px !important; 
      padding: 0 12px !important; 
      font-size: 16px !important; 
    }
    
    /* HP: Date input fix */
    @media (max-width: 640px) {
      input[type="date"] {
        font-size: 16px !important;
        padding: 0 12px 1px 12px !important;
        background: white;
        -webkit-appearance: none;
        appearance: none;
      }
      
      input[type="date"]::-webkit-calendar-picker-indicator {
        opacity: 0.7;
        cursor: pointer;
      }
    }
    
    /* iOS Safari date fix */
    @supports (-webkit-touch-callout: none) {
      input[type="date"] {
        padding: 12px !important;
        font-size: 16px !important;
      }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-sky-50 to-emerald-50 min-h-screen flex items-center justify-center p-4">
  
  <div id="app" class="w-full max-w-md">
    
    <!-- Header Simetris -->
    <div class="text-center mb-8 fade-up">
      <div class="w-16 h-16 mx-auto mb-4 rounded-2xl bg-sky-100 border-4 border-sky-200 flex items-center justify-center">
        <i data-lucide="graduation-cap" class="w-8 h-8 text-sky-600"></i>
      </div>
      <h1 class="text-2xl sm:text-3xl font-black text-sky-900 mb-2">SMA NEGERI 1 BUNUT</h1>
      <p class="text-lg font-semibold text-sky-700 mb-1">Pengumuman Kelulusan Pukul 22.00 WIB </p>
      <p class="text-sm text-sky-500">Tahun Ajaran 2025/2026</p>
    </div>

    <!-- Form Card Ramping -->
    <div id="form-card" class="glass rounded-2xl shadow-xl border border-sky-100 p-8 fade-up" style="animation-delay:0.2s;">
      <h2 class="text-xl font-bold text-sky-900 mb-1 text-center">Cek Kelulusan</h2>
      <p class="text-sm text-sky-600 mb-8 text-center">Masukkan NISN dan tanggal lahir</p>
      
      <form id="check-form" class="space-y-5">
        <div>
          <label for="nisn" class="block text-sm font-semibold text-sky-800 mb-2">NISN</label>
          <input id="nisn" type="text" inputmode="numeric" maxlength="10" placeholder="10 digit NISN" required 
                 class="w-full rounded-xl border-2 border-sky-200 focus:border-sky-500 focus:ring-2 focus:ring-sky-200/50 text-sm bg-white">
        </div>
        
        <div>
          <label for="tgl-lahir" class="block text-sm font-semibold text-sky-800 mb-2">Tanggal Lahir</label>
          <input id="tgl-lahir" type="date" required 
                 class="w-full rounded-xl border-2 border-sky-200 focus:border-sky-500 focus:ring-2 focus:ring-sky-200/50 text-sm bg-white">
        </div>
        
        <button type="submit" id="submit-btn" 
                class="w-full py-3 rounded-xl bg-sky-600 hover:bg-sky-700 active:scale-95 text-white font-bold text-sm flex items-center justify-center gap-2 shadow-lg shadow-sky-200 transition-all h-12">
          <i data-lucide="search" class="w-5 h-5"></i>
          <span>Cek Kelulusan</span>
        </button>
      </form>
      
      <p id="error-msg" class="hidden mt-5 p-3 rounded-xl text-sm text-red-500 text-center font-medium bg-red-50 border border-red-200"></p>
    </div>

    <!-- Result Card Ramping -->
    <div id="result-card" class="hidden glass rounded-2xl shadow-xl border border-sky-100 p-8 text-center relative overflow-hidden mt-6 fade-up">
      <div id="confetti-container" class="absolute inset-0 pointer-events-none"></div>
      <div id="result-icon" class="mx-auto mb-4 w-12 h-12 rounded-xl bg-white/50 backdrop-blur flex items-center justify-center shadow-lg border border-white/30"></div>
      
      <h3 id="result-name" class="text-xl font-bold text-sky-900 mb-1"></h3>
      <p id="result-nisn-display" class="text-sm text-sky-500 mb-4"></p>
      
      <div id="result-status" class="inline-block px-6 py-2 rounded-full text-sm font-bold mb-4 mx-auto"></div>
      <p id="result-message" class="text-sm text-sky-700 mb-6 leading-relaxed"></p>
      
      <button id="back-btn" class="px-6 py-2 rounded-xl border-2 border-sky-200 text-sky-700 font-semibold hover:bg-sky-50 transition-all text-sm h-10 flex items-center justify-center mx-auto">
        <i data-lucide="arrow-left" class="w-4 h-4 mr-1"></i>
        Kembali
      </button>
    </div>
  </div>

    const form = document.getElementById('check-form');
    const formCard = document.getElementById('form-card');
    const resultCard = document.getElementById('result-card');
    const errorMsg = document.getElementById('error-msg');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      errorMsg.classList.add('hidden');

      const nisn = document.getElementById('nisn').value.trim();
      const tglLahir = document.getElementById('tgl-lahir').value;

      if (nisn.length !== 10) {
        errorMsg.textContent = "NISN masukkan dengan benar";
        errorMsg.classList.remove('hidden');
        return;
      }

      const student = students.find(s => s.nisn === nisn && s.tgl_lahir === tglLahir);
      if (!student) {
        errorMsg.textContent = "Data tidak ditemukan";
        errorMsg.classList.remove('hidden');
        return;
      }

      showResult(student);
    });

    function showResult(student) {
      formCard.classList.add('fade-out');
      setTimeout(() => {
        formCard.classList.add('hidden');
        formCard.classList.remove('fade-out');
        resultCard.classList.remove('hidden');
        resultCard.classList.add('scale-in');

        document.getElementById('result-name').textContent = student.nama;
        document.getElementById('result-nisn-display').textContent = `NISN: ${student.nisn}`;

        const statusEl = document.getElementById('result-status');
        const iconEl = document.getElementById('result-icon');
        const msgEl = document.getElementById('result-message');

        if (student.status === "lulus") {
          iconEl.innerHTML = '<i data-lucide="award" class="w-6 h-6 text-green-500"></i>';
          statusEl.textContent = "LULUS";
          statusEl.className = "inline-block px-6 py-2 rounded-full text-sm font-bold bg-green-100 text-green-700 border border-green-200";
          msgEl.textContent = "Selamat! Anda dinyatakan LULUS.";
          spawnConfetti();
        } else if (student.status === "verifikasi") {
          iconEl.innerHTML = '<i data-lucide="clock" class="w-6 h-6 text-blue-500"></i>';
          statusEl.textContent = "VERIFIKASI";
          statusEl.className = "inline-block px-6 py-2 rounded-full text-sm font-bold bg-blue-100 text-blue-700 border border-blue-200";
          msgEl.innerHTML = `<div class="text-left bg-blue-50 rounded-lg p-3 mt-2 text-xs">
            <p class="font-semibold mb-1">Status sedang diverifikasi:</p>
            <ul class="space-y-1 pl-3 text-xs">
              <li>• Belum Menuntaskan Tugas</li>
              <li>• Hubungi Wali Kelas</li>
            </ul>
            <p class="mt-2">Cek kembali besok</p>
          </div>`;
        } else {
          iconEl.innerHTML = '<i data-lucide="x-circle" class="w-6 h-6 text-red-500"></i>';
          statusEl.textContent = "TIDAK LULUS";
          statusEl.className = "inline-block px-6 py-2 rounded-full text-sm font-bold bg-red-100 text-red-700 border border-red-200";
          msgEl.textContent = "Tidak Mengikuti KBM dan Tidak mengikuti ujian, .";
        }
        lucide.createIcons();
      }, 300);
    }

    function spawnConfetti() {
      const container = document.getElementById('confetti-container');
      container.innerHTML = '';
      const colors = ['#10b981','#22c55e','#84cc16','#f59e0b','#ec4899','#8b5cf6','#06b6d4','#0284c7'];
      for (let i = 0; i < 30; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.top = '80%';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.3 + 's';
        container.appendChild(piece);
      }
    }

    document.getElementById('back-btn').addEventListener('click', function() {
      resultCard.classList.add('fade-out');
      setTimeout(() => {
        resultCard.classList.add('hidden');
        resultCard.classList.remove('fade-out', 'scale-in');
        formCard.classList.remove('hidden');
        formCard.classList.add('fade-up');
        form.reset();
      }, 300);
    });

    lucide.createIcons();
